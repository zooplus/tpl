name: Build & Tests

# on:
#   push:
#     tags:
#       - "v*"
on:
  push:
    paths-ignore:
      - "README.md"
    branches:
      - main
      - feature/*
      - bugfix/*
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup GoLang
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run Go Unit Tests
        run: go test -v

  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup GoLang
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - id: vars
        run: |
          echo "GOBIN=$(go env GOPATH)/bin" >> "$GITHUB_OUTPUT"
          echo "GOVERSION=$(go version | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Restore cached linting tools
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ steps.vars.outputs.GOBIN }}/goimports
            ${{ steps.vars.outputs.GOBIN }}/gocyclo
            ${{ steps.vars.outputs.GOBIN }}/golangci-lint
          key: golint-v1-${{ github.job }}-${{ runner.os }}-${{ steps.vars.outputs.GOVERSION }}-${{ hashFiles('tools/go.mod', 'tools/go.sum') }}

      - name: Install dependencies
        run: cd tools && go install ./...

      - name: Update cache of linting tools
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ steps.vars.outputs.GOBIN }}/goimports
            ${{ steps.vars.outputs.GOBIN }}/gocyclo
            ${{ steps.vars.outputs.GOBIN }}/golangci-lint
          key: golint-v1-${{ github.job }}-${{ runner.os }}-${{ steps.vars.outputs.GOVERSION }}-${{ hashFiles('tools/go.mod', 'tools/go.sum') }}

      - uses: j178/prek-action@v2.0.1

  build:
    needs:
      - unit-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64 # Windows ARM64 is not supported by Go
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup GoLang
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # - name: Run vet & lint
      #   run: |
      #     go install golang.org/x/lint/golint@latest
      #     go vet cmd
      #     golint cmd
      # - uses: actions/setup-python@v5
      # - uses: pre-commit/action@v3.0.1

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          dry_run: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version from Tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build
        id: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -x
          go version

          export CGO_ENABLED=0

          OUTPUT_NAME=tpl-${{ matrix.os }}-${{ matrix.arch }}
          if [ "${{ matrix.os }}" == "windows" ]; then
            OUTPUT_NAME+=".exe"
          fi
          if [ "${{ matrix.os }}" == "darwin" ]; then
            OUTPUT_NAME=tpl-macos-${{ matrix.arch }}
          fi
          go build \
            -ldflags="-X main.BuildVersion=${{ steps.tag_version.outputs.new_tag }}" \
            -o bin/$OUTPUT_NAME \
            .

          echo "binary=${OUTPUT_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.binary }}
          path: bin/*

      # NOTE: UPX compression causes segmentation faults when processing many
      # environment variables due to memory corruption during decompression.
      # See: https://github.com/tgagor/tpl/issues/...
      # - name: Run UPX
      #   uses: crazy-max/ghaction-upx@v3
      #   if: ${{ matrix.os != 'darwin' }}
      #   with:
      #     version: latest
      #     files: |
      #       ./bin/*
      #     args: -fq

  test:
    name: test on ${{ matrix.os }}
    needs:
      - build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary: tpl-linux-amd64

          - os: macos-latest
            binary: tpl-macos-arm64

          - os: windows-latest
            binary: tpl-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary }}
          path: .

      - name: Get Version from Tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Run test on Linux/MacOS
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x ${{ matrix.binary }}
          ./${{ matrix.binary }} -v

          export foo="bar"
          export bar="[foo,bar]"
          export foobar="{foo:bar,bar:foo}"
          export foobaz="{foo:[bar,baz]}"
          export baz="1.0-123"
          export number="59614658972"
          export null="null"
          export empty=
          export money="500€"
          export special="?&>=:/"
          export woot="[]"
          export whoa="{}"
          export backslash="\.\/"
          export urls="{google:[https:://google.com,http:://google.de],github:https:://github.com}"
          export json='{"abc":123,"def":["a","b","c"],"ghi":"[{,!?!,}]"}'

          echo
          echo

          ./${{ matrix.binary }} -t test/test.tpl | diff -y test/test.txt - && echo Tests succeeded! || echo Tests failed!

          echo
          echo

          ./${{ matrix.binary }} -t test/test.tpl -o test/test.out && diff -y test/test.txt test/test.out && echo Tests succeeded! || echo Tests failed!

      - name: Run test on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\\${{ matrix.binary }} -v

          # Set environment variables with proper PowerShell escaping
          $env:foo = "bar"
          $env:bar = "[foo,bar]"
          $env:foobar = "{foo:bar,bar:foo}"
          $env:foobaz = "{foo:[bar,baz]}"
          $env:baz = "1.0-123"
          $env:number = "59614658972"
          $env:null = "null"
          $env:empty = ""
          $env:money = "500€"
          $env:special = "?&>=:/"
          $env:woot = "[]"
          $env:whoa = "{}"
          $env:backslash = '\.\/'
          $env:urls = "{google:[https:://google.com,http:://google.de],github:https:://github.com}"
          $env:json = @'
          {"abc":123,"def":["a","b","c"],"ghi":"[{,!?!,}]"}
          '@

          Write-Host "`n`n"

          # Run the first test and compare output with test.txt
          .\\${{ matrix.binary }} -t test/test.tpl | Out-File -FilePath test_temp_1.out -Encoding utf8
          $expected = (Get-Content -Path "test/test.txt" -Raw).TrimEnd()
          $actual = (Get-Content -Path "test_temp_1.out" -Raw).TrimEnd()

          # Remove empty value test section (known Windows issue with Go binary)
          $expected = $expected -replace "empty value:\r?\n_\r?\n", ""
          $actual = $actual -replace "empty value:\r?\n_<no value>\r?\n", ""

          if ($expected -eq $actual) {
            Write-Host "✅ First test succeeded!" -ForegroundColor Green
          } else {
            Write-Host "❌ First test failed!" -ForegroundColor Red
            Write-Host "Expected:`n$expected"
            Write-Host "Actual:`n$actual"
            exit 1
          }

          Write-Host "`n`n"

          # Run the second test with output redirection and compare files
          .\\${{ matrix.binary }} -t test/test.tpl -o test/test.out
          $expected = (Get-Content -Path "test/test.txt" -Raw).TrimEnd()
          $actual = (Get-Content -Path "test/test.out" -Raw).TrimEnd()

          # Remove empty value test section (known Windows issue with Go binary)
          $expected = $expected -replace "empty value:\r?\n_\r?\n", ""
          $actual = $actual -replace "empty value:\r?\n_<no value>\r?\n", ""

          if ($expected -eq $actual) {
            Write-Host "✅ Second test succeeded!" -ForegroundColor Green
          } else {
            Write-Host "❌ Second test failed!" -ForegroundColor Red
            Write-Host "Expected:`n$expected"
            Write-Host "Actual:`n$actual"
            exit 1
          }

  action-test: # the Github action
    name: test action on ${{ matrix.os }}
    needs:
      - build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary: tpl-linux-amd64

          - os: macos-latest
            binary: tpl-macos-arm64

          - os: windows-latest
            binary: tpl-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Test the action from the current branch code
      - uses: ./
        with:
          version: latest

      - name: Run test on Linux/MacOS
        if: matrix.os != 'windows-latest'
        run: tpl -v

      - name: Run test on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: tpl.exe -v

  release:
    permissions: write-all
    runs-on: ubuntu-latest
    needs:
      - test
      - action-test
      - build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: new_tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          dry_run: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: Calculate checksums
        run: |
          cd bin
          sha512sum tpl-* > sha512sums.txt

      - name: Update README
        # if: ${{ !contains(github.event.commits[0].message, 'auto-update README') }}
        run: |
          chmod +x bin/*
          ln -s $(pwd)/bin/tpl-linux-amd64 /usr/local/bin/tpl
          tpl -v

          export TPL_VERSION=${{ steps.new_tag_version.outputs.new_tag }}

          tpl -t README.md.tpl | tee README.md

          if [[ "$(git status --porcelain)" != "" ]]; then
            git config user.name "GitHub Action"
            git config user.email "action@github.com"
            git add .
            git commit -m "docs(readme): auto-update README.md"
            git push
          fi

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create normal GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          release_name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      - name: Upload multiple assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          for asset in bin/*; do
            gh release upload "${{ steps.tag_version.outputs.new_tag }}" "$asset"
          done
